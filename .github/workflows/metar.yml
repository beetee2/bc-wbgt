name: Fetch KI93 METAR

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch METAR and push to data branch
        run: |
          curl -sf --retry 2 "https://aviationweather.gov/api/data/metar?ids=KI93&format=json" -o metar.json
          python3 -c "import json; d=json.load(open('metar.json')); assert d and d[0]['icaoId']=='KI93' and d[0]['temp'] is not None"
          git init -b data repo
          cd repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mv ../metar.json .
          git add metar.json
          git commit -m "Update KI93 METAR"
          git push --force "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" data
